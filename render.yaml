services:
  - type: web
    name: google-docs-clone
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
