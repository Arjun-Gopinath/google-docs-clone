services:
  - type: web
    name: google-docs-clone
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
